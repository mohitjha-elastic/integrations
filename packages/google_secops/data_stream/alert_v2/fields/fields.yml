- name: google_secops
  type: group
  fields:
    - name: alert_v2
      type: group
      fields:
        - name: created_time
          type: date
          description: "Time the detection was created."
        - name: detection
          type: group
          description: "SecurityResult entries from the Chronicle API detection field."
          fields:
            - name: alert_state
              type: keyword
              description: "Indicates whether the rule generating this detection currently has alerting enabled or disabled."
            - name: description
              type: keyword
              description: "Description of the rule that generated the detection. This description is copied from the rule metadata's `description` key, if it is set."
            - name: detection_fields
              type: flattened
              description: 'Fields specified in the rule for "MULTI_EVENT" rules, keyed by field name.'
            - name: outcomes
              type: flattened
              description: Outcome variables from the detection rule, keyed by outcome name.
            - name: risk_score
              type: long
            - name: risk_score
              type: group
              fields:
                - name: int64_val
                  type: long
                - name: type
                  type: keyword
                - name: value
                  type: long
            - name: rule_id
              type: keyword
              description: "Identifier for the rule generating the detection."
            - name: rule_labels
              type: flattened
              description: Rule metadata labels from the detection, keyed by label name.
            - name: rule_name
              type: keyword
              description: "Name of the rule generating the detection, as parsed from `ruleText`."
            - name: rule_type
              type: keyword
              description: 'Whether the rule generating this detection is a single event or multi-event rule ("SINGLE_EVENT" or "MULTI_EVENT").'
            - name: rule_version
              type: keyword
              description: "Identifier for the rule version generating the detection."
            - name: url_back_to_product
              type: keyword
              description: "URL pointing to the Google Security Operations application page for this detection."
            - name: variables
              type: group
              fields:
                - name: risk_score
                  type: group
                  fields:
                    - name: type
                      type: keyword
                    - name: value
                      type: long
                    - name: int64_val
                      type: long
        - name: detection_time
          type: date
          description: "String representing the time period the detection was found in."
        - name: event
          type: group
          fields:
            - name: about
              type: group
              fields:
                - name: file
                  type: group
                  fields:
                    - name: full_path
                      type: keyword
                      description: "The full path identifying the location of the file on the system."
                - name: group

---
description: Pipeline for processing alert logs.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: 8.17.0
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.

  # parse the event JSON
  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null
  - json:
      field: event.original
      tag: json_event_original
      target_field: json
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # rename to snake case
  - script:
      tag: script_convert_camelcase_to_snake_case
      lang: painless
      description: Convert camelCase to snake_case
      if: ctx.json != null
      source: |
        // Helper function to convert camelCase to snake_case
        String camelToSnake(String str) {
          def result = "";
          def lastCharWasUpperCase = false;
          for (int i = 0; i < str.length(); i++) {
            char c = str.charAt(i);
            if (Character.isUpperCase(c)) {
              if (i > 0 && !lastCharWasUpperCase) {
                result += "_";
              }
              result += Character.toLowerCase(c);
              lastCharWasUpperCase = true;
            } else {
              result += c;
              lastCharWasUpperCase = false;
            }
          }
          return result;
        }
        // Recursive function to handle nested fields
        def convertToSnakeCase(def obj) {
          if (obj instanceof Map) {
            // Convert each key in the map
            def newObj = [:];
            for (entry in obj.entrySet()) {
              // Skip fields that contain '@' in their name
              if (!entry.getKey().contains("@")) {
                String newKey = camelToSnake(entry.getKey());
                newObj[newKey] = convertToSnakeCase(entry.getValue());
              }
            }
            return newObj;
          } else if (obj instanceof List) {
            // If it's a list, process each item recursively
            def newList = [];
            for (item in obj) {
              newList.add(convertToSnakeCase(item));
            }
            return newList;
          } else {
            return obj;
          }
        }
        // Apply the conversion
        ctx.google_secops = ctx.google_secops ?: [:];
        ctx.google_secops.alert_v2 = convertToSnakeCase(ctx.json);
  - remove:
      field: json
      tag: remove_json_after_snake_case
      ignore_missing: true
  - script:
      lang: painless
      tag: script_map_detection_key_value_pairs
      description: Map detection key value arrays into objects, following the Google Workspace parameters pattern.
      if: ctx.google_secops?.alert_v2?.detection instanceof List
      source: |
        String[] kvFields = new String[] {"detection_fields", "outcomes", "rule_labels"};
        for (def detection : ctx.google_secops.alert_v2.detection) {
          for (def fieldName : kvFields) {
            if (!(detection[fieldName] instanceof List)) {
              continue;
            }
            def flat = new HashMap();
            for (def entry : detection[fieldName]) {
              if (entry?.key == null || entry.key == '') {
                continue;
              }
              if (entry.value != null && entry.value != '') {
                flat[entry.key] = entry.value;
              } else if (entry.source != null && entry.source != '') {
                flat[entry.key] = entry.source;
              }
            }
            if (flat.isEmpty()) {
              detection.remove(fieldName);
            } else {
              detection[fieldName] = flat;
            }
          }
        }

  # convert values
  - date:
      field: google_secops.alert_v2.created_time
      tag: date_created_time
      target_field: google_secops.alert_v2.created_time
      formats:
        - ISO8601
      if: ctx.google_secops?.alert_v2?.created_time != null && ctx.google_secops.alert_v2.created_time != ''
      on_failure:
        - remove:
            field: google_secops.alert_v2.created_time
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: google_secops.alert_v2.detection
      tag: foreach_convert_detection_risk_score_to_long
      processor:
        convert:
          field: _ingest._value.risk_score
          tag: convert_detection_risk_score_to_long
          type: long
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value.risk_score
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
      ignore_missing: true

  # event.*
  - set:
      field: event.kind
      tag: set_event_kind_to_alert
      value: alert
  - set:
      field: event.created
      tag: set_event_created_from_alert_created_time
      copy_from: google_secops.alert_v2.created_time
      ignore_empty_value: true
  - foreach:
      field: google_secops.alert_v2.detection
      tag: foreach_append_detection_risk_score_into_event_risk_score
      processor:
        append:
          field: event.risk_score
          tag: append_detection_risk_score_into_event_risk_score
          value: '{{{_ingest._value.risk_score}}}'
          allow_duplicates: false
      ignore_missing: true
  - convert:
      field: event.risk_score
      tag: convert_event_risk_score_to_long
      type: long
      ignore_missing: true
      if: ctx.event?.risk_score != ""
      on_failure:
        - remove:
            field: event.risk_score
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - foreach:
      field: google_secops.alert_v2.event.security_result
      tag: foreach_append_event_security_result_action_into_event_action
      if: ctx.google_secops?.alert_v2?.event?.security_result instanceof List
      ignore_missing: true
      processor:
        foreach:
          field: _ingest._value.action
          tag: foreach_foreach_append_event_security_result_action_into_event_action
          ignore_missing: true
          processor:
            append:
              field: event.action
              tag: append_event_security_result_action_into_event_action
              value: '{{{_ingest._value}}}'
              allow_duplicates: false
  - lowercase:
      field: event.action
      tag: lowercase_event_action
      ignore_missing: true
  - script:
      lang: painless
      description: Script to set event.severity.
      tag: set_event_severity
      source: |-
        if (ctx.google_secops?.alert_v2?.event?.security_result instanceof List) {
          for (list in ctx.google_secops?.alert_v2?.event.security_result) {
            if (list["severity"] != null && list["severity"] != '') {
              if (list["severity"].equalsIgnoreCase('critical')) {
                ctx.event.severity = 99
              } else if (list["severity"].equalsIgnoreCase('error')) {
                ctx.event.severity = 99
              } else if (list["severity"].equalsIgnoreCase('high')) {
                ctx.event.severity = 73
              } else if (list["severity"].equalsIgnoreCase('informational')) {
                ctx.event.severity = 21
              }  else if (list["severity"].equalsIgnoreCase('low')) {
                ctx.event.severity = 21
              } else if (list["severity"].equalsIgnoreCase('medium')) {
                ctx.event.severity = 47
              } else if (list["severity"].equalsIgnoreCase('none')) {
                ctx.event.severity = 21
              } else if (list["severity"].equalsIgnoreCase('unknown_severity')) {
                ctx.event.severity = 21
              }
            }
          }
        }
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'

  # rule.*
  - foreach:
      field: google_secops.alert_v2.detection
      tag: foreach_append_detection_description_into_rule_description
      processor:
        append:
          field: rule.description
          tag: append_detection_description_into_rule_description
          value: '{{{_ingest._value.description}}}'
          allow_duplicates: false
      ignore_missing: true
  - foreach:
      field: google_secops.alert_v2.detection
      tag: foreach_convert_detection_variables_risk_score_int64_val_to_long
      processor:
        convert:
          field: _ingest._value.variables.risk_score.int64_val
          tag: convert_detection_variables_risk_score_int64_val_to_long
          type: long
          ignore_missing: true
          if: ctx._ingest?._value?.variables?.risk_score?.int64_val != ''
          on_failure:
            - remove:
                field: _ingest._value.variables.risk_score.int64_val
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
      ignore_missing: true
  - foreach:
      field: google_secops.alert_v2.detection
      tag: foreach_convert_detection_variables_risk_score_value_to_long
      processor:
        convert:
          field: _ingest._value.variables.risk_score.value
          tag: convert_detection_variables_risk_score_value_to_long
          type: long
          ignore_missing: true
          if: ctx._ingest?._value?.variables?.risk_score?.value != ''
          on_failure:
            - remove:
                field: _ingest._value.variables.risk_score.value
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
      ignore_missing: true
  - foreach:
      field: google_secops.alert_v2.detection
      tag: foreach_append_detection_rule_id_into_rule_id
      processor:
        append:
          field: rule.id
          tag: append_detection_rule_id_into_rule_id
          value: '{{{_ingest._value.rule_id}}}'
          allow_duplicates: false
      ignore_missing: true
  - foreach:
      field: google_secops.alert_v2.detection
      tag: foreach_append_detection_rule_name_into_rule_name
      processor:
        append:
          field: rule.name
          tag: append_detection_rule_name_into_rule_name
          value: '{{{_ingest._value.rule_name}}}'
          allow_duplicates: false
      ignore_missing: true
  - foreach:
      field: google_secops.alert_v2.detection
      tag: foreach_append_detection_rule_name_into_friendly_name
      processor:
        append:
          field: google_secops.alert_v2.friendly_name
          tag: append_detection_rule_name_into_friendly_name
          value: '{{{_ingest._value.rule_name}}}'
          allow_duplicates: false
      ignore_missing: true
  - foreach:
      field: google_secops.alert_v2.detection
      tag: foreach_append_detection_rule_version_into_rule_version
      processor:
        append:
          field: rule.version
          tag: append_detection_rule_version_into_rule_version
          value: '{{{_ingest._value.rule_version}}}'
          allow_duplicates: false
      ignore_missing: true
  - date:
      field: google_secops.alert_v2.detection_time
      tag: date_detection_time
      target_field: google_secops.alert_v2.detection_time
      formats:
        - ISO8601
      if: ctx.google_secops?.alert_v2?.detection_time != null && ctx.google_secops.alert_v2.detection_time != ''
      on_failure:
        - remove:
            field: google_secops.alert_v2.detection_time
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  # @timestamp
  - set:
      field: '@timestamp'
      tag: set_@timestamp_from_alert_detection_time
      copy_from: google_secops.alert_v2.detection_time
      ignore_empty_value: true
  - convert:
      field: google_secops.alert_v2.event.metadata.base_labels.allow_scoped_access
      tag: convert_event_metadata_base_labels_allow_scoped_access_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: google_secops.alert_v2.event.metadata.base_labels.allow_scoped_access
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  # message
  - set:
      field: message
      tag: set_message_from_alert_event_metadata_description
      copy_from: google_secops.alert_v2.event.metadata.description
      ignore_empty_value: true
  - convert:
      field: google_secops.alert_v2.event.metadata.enrichment_labels.allow_scoped_access
      tag: convert_event_metadata_enrichment_labels_allow_scoped_access_to_boolean
      type: boolean
      ignore_missing: true
      on_failure:
        - remove:
            field: google_secops.alert_v2.event.metadata.enrichment_labels.allow_scoped_access
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: google_secops.alert_v2.event.metadata.event_timestamp
      tag: date_event_metadata_event_timestamp
      target_field: google_secops.alert_v2.event.metadata.event_timestamp
      formats:
        - ISO8601
      if: ctx.google_secops?.alert_v2?.event?.metadata?.event_timestamp != null && ctx.google_secops.alert_v2.event.metadata.event_timestamp != ''
      on_failure:
        - remove:
            field: google_secops.alert_v2.event.metadata.event_timestamp
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - date:
      field: google_secops.alert_v2.event.metadata.ingested_timestamp
      tag: date_event_metadata_ingested_timestamp
      target_field: google_secops.alert_v2.event.metadata.ingested_timestamp
      formats:
        - ISO8601
      if: ctx.google_secops?.alert_v2?.event?.metadata?.ingested_timestamp != null && ctx.google_secops.alert_v2.event.metadata.ingested_timestamp != ''
      on_failure:
        - remove:
            field: google_secops.alert_v2.event.metadata.ingested_timestamp
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  # observer.*
  - set:
      field: observer.product
      tag: set_observer_product_from_alert_event_metadata_product_name
      copy_from: google_secops.alert_v2.event.metadata.product_name
      ignore_empty_value: true
  - set:
      field: observer.vendor
      tag: set_observer_vendor_from_alert_event_metadata_vendor_name
      copy_from: google_secops.alert_v2.event.metadata.vendor_name
      ignore_empty_value: true
  # dns.*
  - foreach:
      field: google_secops.alert_v2.event.network.dns.answers
      tag: foreach_event_network_dns_answers_data
      if: ctx.google_secops?.alert_v2?.event?.network?.dns?.answers instanceof List
      processor:
        append:
          field: dns.answers.data
          tag: append_event_network_dns_answers_data_into_dns_answers_data
          value: '{{{_ingest._value.data}}}'
          allow_duplicates: false
      ignore_missing: true
  - foreach:
      field: google_secops.alert_v2.event.network.dns.answers
      tag: foreach_event_network_dns_answers_name
      if: ctx.google_secops?.alert_v2?.event?.network?.dns?.answers instanceof List
      processor:
        append:
          field: dns.answers.name
          tag: append_event_network_dns_answers_name_into_dns_answers_name
          value: '{{{_ingest._value.name}}}'
          allow_duplicates: false
      ignore_missing: true
  - foreach:
      field: google_secops.alert_v2.event.network.dns.answers
      tag: foreach_google_secops_alert_event_network_dns_answers_type
      if: ctx.google_secops?.alert_v2?.event?.network?.dns?.answers instanceof List
      processor:
        append:
          field: dns.answers.type
          tag: append_event_network_dns_answers_type_into_dns_answers_type
          value: '{{{_ingest._value.type}}}'
          allow_duplicates: false
      ignore_missing: true
  - foreach:
      field: google_secops.alert_v2.event.network.dns.questions
      if: ctx.google_secops?.alert_v2?.event?.network?.dns?.questions instanceof List
      tag: foreach_google_secops_alert_event_network_dns_questions_name
      processor:
        append:
          field: dns.question.name
          tag: append_event_network_dns_questions_name_into_dns_question_name
          value: '{{{_ingest._value.name}}}'
          allow_duplicates: false
      ignore_missing: true
  - foreach:
      field: google_secops.alert_v2.event.network.dns.questions
      tag: foreach_google_secops_alert_event_network_dns_questions_type
      if: ctx.google_secops?.alert_v2?.event?.network?.dns?.questions instanceof List
      processor:
        append:
          field: dns.question.type
          tag: append_event_network_dns_questions_type_into_dns_question_type
          value: '{{{_ingest._value.type}}}'
          allow_duplicates: false
      ignore_missing: true
  # email.*
  - foreach:
      field: google_secops.alert_v2.event.network.email.bcc
      tag: foreach_google_secops_alert_event_network_email_bcc
      if: ctx.google_secops?.alert_v2?.event?.network?.email?.bcc instanceof List
      processor:
        append:
          field: email.bcc.address
          tag: append_event_network_email_bcc_into_email_bcc_address
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
      ignore_missing: true
  - foreach:
      field: google_secops.alert_v2.event.network.email.cc
      tag: foreach_google_secops_alert_event_network_email_cc
      if: ctx.google_secops?.alert_v2?.event?.network?.email?.cc instanceof List
      processor:
        append:
          field: email.cc.address
          tag: append_event_network_email_cc_into_email_cc_address
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
      ignore_missing: true
  - append:
      field: email.from.address
      tag: append_google_secops_alert_event_network_email_from_into_email_from_address
      value: '{{{google_secops.alert_v2.event.network.email.from}}}'
      allow_duplicates: false
      if: ctx.google_secops?.alert_v2?.event?.network?.email?.from != null
  - append:
      field: email.reply_to.address
      tag: append_google_secops_alert_event_network_email_reply_to_into_email_reply_to_address
      value: '{{{google_secops.alert_v2.event.network.email.reply_to}}}'
      allow_duplicates: false
      if: ctx.google_secops?.alert_v2?.event?.network?.email?.reply_to != null
  - foreach:
      field: google_secops.alert_v2.event.network.email.subject
      tag: foreach_google_secops_alert_event_network_email_subject
      if: ctx.google_secops?.alert_v2?.event?.network?.email?.subject instanceof List
      processor:
        append:
          field: email.subject
          tag: append_event_network_email_subject_into_email_subject
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
      ignore_missing: true
  - foreach:
      field: google_secops.alert_v2.event.network.email.to
      tag: foreach_google_secops_alert_event_network_email_to
      if: ctx.google_secops?.alert_v2?.event?.network?.email?.to instanceof List
      processor:
        append:
          field: email.to.address
          tag: append_event_network_email_to_into_email_to_address
          value: '{{{_ingest._value}}}'
          allow_duplicates: false
      ignore_missing: true
  # http.*
  - set:
      field: http.request.method
      tag: set_http_request_method_from_alert_event_network_http_method
      copy_from: google_secops.alert_v2.event.network.http.method
      ignore_empty_value: true
  - convert:
      field: google_secops.alert_v2.event.network.http.response_code
      tag: convert_event_network_http_response_code_to_long
      type: long
      ignore_missing: true
      on_failure:
        - remove:
            field: google_secops.alert_v2.event.network.http.response_code
            ignore_missing: true
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
      field: http.response.status_code
      tag: set_http_response_status_code_from_alert_event_network_http_response_code
      copy_from: google_secops.alert_v2.event.network.http.response_code
      ignore_empty_value: true
  # user_agent.*
  - set:
      field: user_agent.original
      tag: set_user_agent_original_from_alert_event_network_http_user_agent
      copy_from: google_secops.alert_v2.event.network.http.user_agent
      ignore_empty_value: true

  - user_agent:
      field: user_agent.original
      tag: user_agent_original
      if: ctx.user_agent?.original != null
      ignore_missing: true
      on_failure:
        - append:
            field: error.message
            value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
  - set:
  # network.*
      field: network.transport
      tag: set_network_transport_from_alert_event_network_ip_protocol
      copy_from: google_secops.alert_v2.event.network.ip_protocol
      ignore_empty_value: true
  - lowercase:
      field: network.transport
      tag: lowercase_network_transport
      ignore_missing: true
  - foreach:
      field: google_secops.alert_v2.event.principal.asset.ip
      if: ctx.google_secops?.alert_v2?.event?.principal?.asset?.ip instanceof List
      tag: foreach_google_secops_alert_event_principal_asset_ip
      processor:
        convert:
          field: _ingest._value
          tag: convert_event_principal_asset_ip_to_ip
          type: ip
          ignore_missing: true
          on_failure:
            - remove:
                field: _ingest._value
                ignore_missing: true
            - append:
                field: error.message
                value: 'Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.on_failure_pipeline}}} failed with message: {{{_ingest.on_failure_message}}}'
      ignore_missing: true
  - foreach:
  # related.*
      field: google_secops.alert_v2.event.principal.asset.ip
      tag: foreach_google_secops_alert_event_principal_asset_ip_related
      if: ctx.google_secops?.alert_v2?.event?.principal?.asset?.ip instanceof List
      processor:
        append:
          field: related.ip
          value: '{{{_ingest._value}}}'
